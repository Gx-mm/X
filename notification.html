<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notifications</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

/* popup */
.popup{
width:90%;
max-width:380px;
height:500px;
background:#0b1d3a;
border-radius:20px;
overflow:hidden;
display:flex;
flex-direction:column;
box-shadow:0 0 40px rgba(0,150,255,.5);
}

/* header */
.header{
padding:15px;
text-align:center;
font-weight:600;
background:linear-gradient(45deg,#FFD700,#FFB800);
color:black;
}

/* content */
.content{
flex:1;
overflow-y:auto;
padding:10px;
}

/* item */
.item{
padding:12px;
margin-bottom:10px;
border-radius:12px;
font-size:14px;
animation:fade .3s ease;
}

.success{background:#00ff9c22;color:#00ff9c;}
.error{background:#ff4d4d22;color:#ff4d4d;}
.pending{background:#ffaa0022;color:#ffaa00;}

.title{
font-weight:600;
margin-bottom:4px;
}

.date{
font-size:11px;
opacity:.6;
margin-top:4px;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<div class="popup">

<div class="header">
🔔 Notifications
</div>

<div id="box" class="content"></div>

</div>

<audio id="sound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = window.supabase.createClient(
"https://sgabwjdydpdhjhzgncmq.supabase.co",
"sb_publishable_uGNWbH6gSVTBbTRotRGXQQ_a7n_mtzb"
);

const userID = localStorage.getItem("userID");

if(!userID){
location.href="index.html";
}

/* ADD UI */
function addNoti(n){

let div=document.createElement("div");
div.className="item " + (n.TYPE || "pending");

div.innerHTML = `
<div class="title">${n.TITLE}</div>
<div>${n.MESSAGE}</div>
<div class="date">${new Date(n.DATE).toLocaleString()}</div>
`;

document.getElementById("box").prepend(div);

}

/* LOAD OLD */
async function loadOld(){

let { data } = await supabaseClient
.from("NOTIFICATION")
.select("*")
.or(`USERID.eq.${userID},USERID.eq.ALL`)
.order("DATE",{ascending:false});

if(!data) return;

data.forEach(n=>{
addNoti(n);
});

}

loadOld();

/* REALTIME */
supabaseClient
.channel('noti-channel')
.on('postgres_changes',{
event:'INSERT',
schema:'public',
table:'NOTIFICATION'
},payload=>{

let n = payload.new;

/* filter */
if(n.USERID === userID || n.USERID === "ALL"){

addNoti(n);

/* sound */
document.getElementById("sound").play();

/* vibration */
if(navigator.vibrate){
navigator.vibrate(200);
}

}

})
.subscribe();

</script>

</body>
</html>
