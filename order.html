<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GrowX • New Order</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
background:
radial-gradient(circle at 20% 20%,#1c2b4a,transparent 40%),
radial-gradient(circle at 80% 0%,#0b1b38,transparent 40%),
linear-gradient(180deg,#020617,#050b1a);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
width:95%;
max-width:420px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border-radius:30px;
padding:30px;
border:1px solid rgba(255,215,0,.4);
box-shadow:0 0 40px rgba(255,215,0,.2);
}

.title{text-align:center;font-size:28px;margin-bottom:10px;}
.balance{text-align:center;margin-bottom:20px;font-size:14px;opacity:.8;}

label{font-size:14px;opacity:.8;}

select,input{
width:100%;
padding:14px;
margin-top:8px;
margin-bottom:18px;
border-radius:20px;
border:1px solid rgba(255,255,255,.1);
background:rgba(0,0,0,.4);
color:white;
}

.qtyBox{display:flex;gap:10px;align-items:center;}

.qtyBtn{
width:40px;height:40px;
border:none;border-radius:12px;
background:rgba(255,255,255,.1);
color:white;font-size:20px;cursor:pointer;
}

.qtyInput{width:80px;text-align:center;}

.total{
background:rgba(255,215,0,.1);
padding:18px;border-radius:20px;text-align:center;
}

.amount{font-size:32px;color:#FFD700;}

.submit{
margin-top:25px;width:100%;padding:15px;border:none;
border-radius:40px;font-weight:700;cursor:pointer;
background:linear-gradient(135deg,#FFD700,#FFB800);
}

.loader{
width:20px;height:20px;border:3px solid white;
border-top:3px solid transparent;border-radius:50%;
animation:spin 1s linear infinite;margin:auto;
}

@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

.popup{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%) scale(.8);
background:#111;padding:30px 40px;border-radius:20px;
text-align:center;box-shadow:0 0 40px rgba(255,215,0,.7);
opacity:0;transition:.3s;
}

.popup.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.success{color:#00ff9c;font-size:26px;}
.error{color:#ff4d4d;font-size:26px;}

</style>
</head>

<body>

<div class="card">

<div class="title">New Order 🚀</div>

<div class="balance">
Balance: ₹<span id="balance">0</span>
</div>

<label>Category</label>
<select id="category"></select>

<label>Service</label>
<select id="service"></select>

<label>Instagram Link</label>
<input id="link" placeholder="Paste Instagram link">

<label>Quantity</label>

<div class="qtyBox">
<button class="qtyBtn" onclick="changeQty(-1000)">-</button>
<input id="qty" class="qtyInput" value="1000">
<button class="qtyBtn" onclick="changeQty(1000)">+</button>
</div>

<div class="total">
Total amount
<div class="amount" id="amount">₹0</div>
</div>

<button id="submitBtn" class="submit" onclick="submitOrder()">
Submit Order
</button>

</div>

<div id="popup" class="popup"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = window.supabase.createClient(
"https://sgabwjdydpdhjhzgncmq.supabase.co",
"sb_publishable_uGNWbH6gSVTBbTRotRGXQQ_a7n_mtzb"
);

const userID = localStorage.getItem("userID");

if(!userID){ location.href="index.html"; }

/* LOAD BALANCE */
async function loadBalance(){
let { data } = await supabaseClient
.from("USER")
.select("BALANCE")
.eq("USERID", userID)
.single();

if(data){
document.getElementById("balance").innerText = data.BALANCE;
}
}

/* POPUP */
function showPopup(type,msg){
const popup=document.getElementById("popup");
popup.innerHTML=`<div class="${type}">${type=="success"?"✔":"⚠"}</div><p>${msg}</p>`;
popup.classList.add("show");
setTimeout(()=>popup.classList.remove("show"),2000);
}

/* LOAD SERVICES */
async function loadServices(){
let { data } = await supabaseClient.from("SERVICE").select("*");

const cat=document.getElementById("category");

const unique=[...new Set(data.map(x=>x.CATEGORY))];

unique.forEach(c=>{
cat.innerHTML+=`<option>${c}</option>`;
});

window.services=data;

loadService();
}

function loadService(){
const cat=document.getElementById("category").value;
const list=services.filter(x=>x.CATEGORY==cat);

const s=document.getElementById("service");
s.innerHTML="";

list.forEach(x=>{
s.innerHTML+=`<option value="${parseFloat(x.PRICEPER1000)}">${x.SERVICENAME}</option>`;
});

calc();
}

/* QTY */
function changeQty(n){
let q=document.getElementById("qty");
let v=parseInt(q.value)+n;
if(v<1)v=1;
q.value=v;
calc();
}

/* CALC */
function calc(){
const price = parseFloat(document.getElementById("service").value) || 0;
const qty = parseInt(document.getElementById("qty").value) || 0;
const total = (price/1000)*qty;
document.getElementById("amount").innerText="₹"+total.toFixed(2);
}

document.getElementById("qty").addEventListener("input",calc);

/* 🔥 GENERATE ORDER ID */
async function generateOrderID(){

let { data } = await supabaseClient
.from("ORDER")
.select("ORDERID");

let count = data.length + 1001;

return "ORD-" + count;

}

/* ORDER */
async function submitOrder(){

const qty=parseInt(document.getElementById("qty").value);
const link=document.getElementById("link").value;
const price=parseFloat(document.getElementById("service").value);
const total=(price/1000)*qty;

if(total<100){ showPopup("error","Minimum ₹100"); return; }
if(!link){ showPopup("error","Link required"); return; }

const btn=document.getElementById("submitBtn");
btn.disabled=true;
btn.innerHTML=`<div class="loader"></div>`;

/* GET USER */
let { data:user } = await supabaseClient
.from("USER")
.select("*")
.eq("USERID",userID)
.single();

if(user.BALANCE < total){
showPopup("error","Insufficient balance");
btn.disabled=false;
btn.innerHTML="Submit Order";
return;
}

/* 🔥 CREATE ORDER ID */
const orderID = await generateOrderID();

/* INSERT ORDER */
await supabaseClient.from("ORDER").insert([{
ORDERID: orderID,
USERID: userID,
SERVICE: service.options[service.selectedIndex].text,
QUANTITY: qty,
PRICE: total,
STATUS: "Pending",
LINK: link,
DATE: new Date()
}]);

/* CUT BALANCE */
await supabaseClient
.from("USER")
.update({ BALANCE: user.BALANCE - total })
.eq("USERID", userID);

showPopup("success","Order placed");

setTimeout(()=>location.href="history.html",1500);

}

category.onchange=loadService;
service.onchange=calc;

loadServices();
loadBalance();

</script>

</body>
</html>
